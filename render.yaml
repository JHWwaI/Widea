services:
  - type: web
    name: widea-api
    runtime: node
    region: singapore
    plan: free
    branch: main
    buildCommand: npm ci && npx prisma generate && npm run build
    startCommand: npx prisma migrate deploy && node dist/server.js
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 10000
      - key: JWT_SECRET
        generateValue: true
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: PINECONE_API_KEY
        sync: false
      - key: PINECONE_INDEX_NAME
        sync: false
      - key: GROQ_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_IDEA_MODEL
        value: llama-3.3-70b-versatile
      - key: GROQ_FALLBACK_MODEL
        value: llama-3.3-70b-versatile
      - key: GEMINI_CHAT_MODEL
        value: gemini-2.5-flash
      - key: GEMINI_FALLBACK_CHAIN
        value: gemini-2.0-flash,gemini-flash-latest
      - key: ADMIN_EMAILS
        sync: false
      - key: APP_BASE_URL
        sync: false
      - key: TOSS_CLIENT_KEY
        sync: false
      - key: TOSS_SECRET_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
      - key: GMAIL_USER
        sync: false
      - key: GMAIL_APP_PASSWORD
        sync: false
      - key: SUPPORT_EMAIL
        sync: false
      - key: JITSI_SERVER
        value: https://meet.jit.si
